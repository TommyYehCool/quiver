services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiver_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-quiver}
      TZ: ${TZ:-Asia/Taipei}
    # phase 6E-5: 慢查詢 log(>500ms 寫到 stdout 給 docker logs)
    command:
      - "postgres"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_line_prefix=%t [%p] [%d] "
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiver} -d ${POSTGRES_DB:-quiver}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - kyc_uploads:/app/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - kyc_uploads:/app/uploads
    command: ["arq", "app.worker.WorkerSettings"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      # Default to the dev stage for local development (bind-mount + hot reload).
      # docker-compose.prod.yml overrides this to `prod`.
      target: dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - web

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # 穿透 nginx,讓同一個 ngrok URL 可以打到 web (/) 和 api (/api/*)
    # Phase 3C-2 會改成用固定 domain:`http --domain=tommy-quiver.ngrok-free.app nginx:80`
    command: ["http", "nginx:80", "--log=stdout"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - nginx

volumes:
  postgres_data:
  kyc_uploads:
