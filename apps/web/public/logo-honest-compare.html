<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>誠實比對:你 upload vs 我畫的 v8</title>
<style>
  body { margin: 0; padding: 40px; background: #0F172A; color: white; font-family: system-ui; }
  h1 { text-align: center; margin-bottom: 32px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1200px; margin: 0 auto; }
  .col { background: #1E293B; padding: 24px; border-radius: 16px; }
  .label { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .render {
    background: linear-gradient(135deg, #7C3AED, #4F46E5);
    border-radius: 12px;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
  }
  img.original { max-width: 100%; height: auto; }
  .note { color: #94A3B8; font-size: 13px; margin-top: 12px; }
  .observe { background: #0F172A; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; }
</style>
</head>
<body>
<h1>誠實比對</h1>
<style>
  .row { grid-template-columns: 1fr 1fr; }
</style>
<div class="row">
  <div class="col">
    <div class="label">⚠️ v9(舊版 SVGO 優化)— 有噪點</div>
    <div class="render" style="background: white; padding: 0;">
      <img src="/logo/mark.svg" class="original" alt="v9"/>
    </div>
    <div class="observe">
      <strong>492,192 bytes / gzip 142 KB</strong><br>
      色塊邊緣有 trace 雜訊<br>
      ⚠️ 白色區塊內有黑點
    </div>
  </div>

  <div class="col">
    <div class="label">✨ v10(potrace 重新 vectorize)</div>
    <div class="render" style="background: white; padding: 0;">
      <img src="/logo/clean-preview.svg" class="original" alt="v10"/>
    </div>
    <div class="observe">
      <strong>48,782 bytes / gzip 19 KB(縮 99%)</strong><br>
      potrace turdsize=100 過濾噪點<br>
      ✓ 純色塊,無雜訊
    </div>
  </div>
</div>
</body>
</html>
