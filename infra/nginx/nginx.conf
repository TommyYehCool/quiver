user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;

  # X-Forwarded-Proto:如果上游(ngrok / cloudflare 等)已設,沿用;
  # 否則用 nginx 本身的 $scheme。這樣 OAuth redirect URI 就會用 https://(ngrok 終端 SSL)。
  map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
  }

  # Tatum webhook payloads can be 50-100KB+; bump cap a bit
  client_max_body_size 8m;

  # Reverse proxy:
  #   /api/*  → api:8000
  #   /*      → web:3000 (Next.js)
  upstream api_upstream {
    server api:8000;
  }
  upstream web_upstream {
    server web:3000;
  }

  server {
    listen 80;
    server_name _;

    # Forward Host so ngrok-domain hostname is preserved (matters for OAuth redirects, cookies, etc.)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;

    location /api/ {
      proxy_pass http://api_upstream;
      # Tatum webhooks can be slow; allow 30s
      proxy_read_timeout 30s;
    }

    # Next.js HMR over WebSocket
    location /_next/webpack-hmr {
      proxy_pass http://web_upstream;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400s;
    }

    location / {
      proxy_pass http://web_upstream;
      # SSE / streaming responses
      proxy_read_timeout 300s;
    }
  }
}
